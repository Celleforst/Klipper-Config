[include fluidd.cfg]
[include Klipper_Backup.cfg]
[include BTT_Octopus.cfg]
# [include Custom_Macros.cfg]
# [include SplashScreen.cfg]

[mcu]
# serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_070028001650535556323420-if00
# serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
serial: /dev/ttyAMA0
restart_method: command

[mcu host]
serial: /tmp/klipper_host_mcu

[virtual_sdcard]
path: /home/mk/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

[exclude_object]

